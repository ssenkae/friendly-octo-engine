<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Cro Bot Documentation" />
    <meta name="keywords" content="Cro, bot, documentation" />
    <meta name="author" content="Sen" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="googlebot" content="noindex, nofollow" />
    <meta name="theme-color" content="#000000" />
    <meta name="application-name" content="Cro Docs" />

    <meta property="og:title" content="Cro Docs" />
    <meta property="og:description" content="Cro Bot Documentation" />
    <meta property="og:url" content="https://sen.rip/cro" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_US" />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Cro Docs" />
    <meta name="twitter:description" content="Cro Bot Documentation" />

    <title>cro docs</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            text-align: center;
            padding: 3rem 2rem;
            max-width: 600px;
        }

        .domain {
            font-size: 4rem;
            font-weight: bold;
            margin-bottom: 2rem;
            letter-spacing: 3px;
        }

        .message {
            font-size: 1.2rem;
            line-height: 2;
        }

        .message a {
            color: #fff;
            text-decoration: underline;
        }

        .message a:hover {
            color: #fff;
        }

        @media (max-width: 768px) {
            .domain {
                font-size: 2.5rem;
            }

            .message {
                font-size: 1rem;
            }

            .container {
                padding: 2rem 1rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="domain">sen.rip</div>
        <div class="message">
            <p>cro docs coming soon</p>
            <p>check out the
                <a href="https://github.com/senunderscore/cro">repository</a>
            </p>
        </div>
    </div>
</body>

</html>
