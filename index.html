<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sen.rip</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            text-align: center;
            border: 2px solid #fff;
            padding: 3rem 2rem;
            max-width: 600px;
        }

        .domain {
            font-size: 4rem;
            font-weight: bold;
            margin-bottom: 2rem;
            letter-spacing: 3px;
            border-bottom: 2px solid #fff;
            padding-bottom: 1.5rem;
        }

        .message {
            font-size: 1.2rem;
            line-height: 2;
            margin-bottom: 1.5rem;
            margin-top: 1.5rem;
        }

        .message a {
            color: #fff;
            text-decoration: underline;
        }

        .message a:hover {
            color: #fff;
        }

        @media (max-width: 768px) {
            .domain {
                font-size: 2.5rem;
            }

            .message {
                font-size: 1rem;
            }

            .container {
                padding: 2rem 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="domain">sen.rip</div>
        <div class="message">
            this site is under construction.<br>
            in the meantime, talk with me on <a href="https://discord.com/user/__sen_">discord</a>.
        </div>
    </div>
</body>
</html>
